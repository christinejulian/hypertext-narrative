<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Developer's Journey</title>

<style>
body{
    font-family: "Times New Roman", serif;
    background: linear-gradient(cyan, forestgreen);
    color: white;
    text-align: center;
    padding: 40px;
    font-size: 25px;
}

#game{
    background: rgba(0,0,0,0.5);
    padding: 20px;
    border-radius: 15px;
    max-width: 900px;
    margin: auto;
}

a{
    color: yellow;
    text-decoration: none;
    font-weight: bold;
}

a:hover{
    color: orange;
}

h1{
    text-shadow: 2px 2px 5px black;
}
</style>

<script>
function showScene(scene){
    document.getElementById("story").innerHTML = scene;
}
</script>

</head>

<body>

<div id="game">

<h1>The Game Developer's Journey</h1>

<div id="story">

<p>
You are Christine, a passionate game developer who dreams of creating unforgettable worlds.
One evening, while working on a new project, you discover a mysterious folder labeled
<b>"Ultimate Game."</b>
</p>

<p>
Do you
<a href="#" onclick="showScene(sceneA)">open the folder</a>
or
<a href="#" onclick="showScene(sceneB)">ignore it and continue coding</a>?
</p>

</div>

</div>

<script>

const sceneA = `
<p>
The folder opens and reveals a magical game engine.
A message appears:
<i>"Every choice creates a new reality."</i>
</p>

<p>
Do you
<a href="#" onclick="showScene(sceneC)">create a horror game</a>
or
<a href="#" onclick="showScene(sceneD)">create an adventure game</a>?
</p>
`;

const sceneB = `
<p>
You continue coding through the night.
Your project becomes stable and polished.
Players love it, but you always wonder what was inside the mysterious folder.
</p>

<p>
<b>Ending: The Practical Developer</b>
</p>

<p>
<a href="#" onclick="location.reload()">Play Again</a>
</p>
`;

const sceneC = `
<p>
You build a terrifying horror game.
Streamers scream. Players post theories.
The game becomes a cult classic.
</p>

<p>
<b>Ending: Master of Horror</b>
</p>

<p>
<a href="#" onclick="location.reload()">Play Again</a>
</p>
`;

const sceneD = `
<p>
You create a colorful adventure game filled with puzzles and secrets.
Thousands of players explore your world.
A hidden portal appears...
</p>

<p>
<a href="#" onclick="showScene(miniGame)">Enter the Portal Mini Game</a>
</p>
`;

const miniGame = `
<h2>Mini Game: Guess the Number</h2>

<p>
I'm thinking of a number between 1 and 5.
Type your guess below.
</p>

<input id="guess" type="number" min="1" max="5">
<button onclick="checkGuess()">Guess</button>

<p id="result"></p>

<p>
<a href="#" onclick="location.reload()">Restart Story</a>
</p>
`;

function checkGuess(){
    let number = Math.floor(Math.random()*5)+1;
    let guess = document.getElementById("guess").value;

    if(guess == number){
        document.getElementById("result").innerHTML =
        "<b>You Win!</b> The portal reveals a legendary game idea.";
    }
    else{
        document.getElementById("result").innerHTML =
        "<b>Wrong!</b> The number was " + number + ". Try again.";
    }
}

</script>

</body>
</html>
