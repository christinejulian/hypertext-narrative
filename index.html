<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Christine_890: A Game Developer's Journey</title>

<style>
body{
    font-family: "Times New Roman", serif;
    background: linear-gradient(midnightblue, black);
    color:white;
    margin:0;
    padding:20px;
    line-height:1.6;
    font-size:22px;
}

#container{
    max-width:900px;
    margin:auto;
    background:rgba(0,0,0,.7);
    padding:25px;
    border-radius:10px;
}

h1{
    text-align:center;
}

button{
    display:block;
    width:100%;
    padding:15px;
    margin:10px 0;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:5px;
}

button:hover{
    background:#ddd;
}

#score{
    text-align:right;
    font-size:20px;
    margin-bottom:15px;
}

a{
    color:gold;
}
</style>
</head>
<body>

<div id="container">

<h1>Christine_890: The Path of a Game Creator</h1>

<div id="score">Score: 0</div>

<div id="game">

<p>
Greetings, esteemed friends and fellow enthusiasts of the gaming realm!
I am Christine_890, a passionate game developer who dreams of creating
memorable experiences for players around the world.
</p>

<p>
My journey begins with a simple question...
</p>

<button onclick="question1()">Begin My Adventure</button>

</div>
</div>

<script>

let score = 0;

function updateScore(){
    document.getElementById("score").innerHTML = "Score: " + score;
}

function question1(){
document.getElementById("game").innerHTML = `
<h2>Chapter 1: My Inspiration</h2>

<p>
As a young creator, what inspired me the most?
</p>

<button onclick="correct1()">Creating games and bringing ideas to life</button>
<button onclick="wrong1()">Avoiding creativity</button>
<button onclick="wrong1()">Ignoring imagination</button>
`;
}

function correct1(){
score++;
updateScore();

document.getElementById("game").innerHTML = `
<h2>Correct!</h2>

<p>
Creating games has always been my passion. Every project starts as an
idea waiting to become reality.
</p>

<button onclick="question2()">Continue</button>
`;
}

function wrong1(){
document.getElementById("game").innerHTML = `
<h2>Not Quite</h2>

<p>
My true inspiration comes from creating games and exploring imagination.
</p>

<button onclick="question2()">Continue</button>
`;
}

function question2(){
document.getElementById("game").innerHTML = `
<h2>Chapter 2: Choosing My Tools</h2>

<p>
Which game engines do I frequently use?
</p>

<button onclick="correct2()">Unity and Unreal Engine</button>
<button onclick="wrong2()">Spreadsheet Software</button>
<button onclick="wrong2()">Word Processors</button>
`;
}

function correct2(){
score++;
updateScore();

document.getElementById("game").innerHTML = `
<h2>Correct!</h2>

<p>
Unity and Unreal Engine help me transform concepts into playable worlds.
</p>

<button onclick="question3()">Continue</button>
`;
}

function wrong2(){
document.getElementById("game").innerHTML = `
<h2>Not Quite</h2>

<p>
Unity and Unreal Engine are the tools that power many of my creations.
</p>

<button onclick="question3()">Continue</button>
`;
}

function question3(){
document.getElementById("game").innerHTML = `
<h2>Chapter 3: My Favorite Challenge</h2>

<p>
What excites me most about game development?
</p>

<button onclick="correct3()">Designing gameplay, stories, and worlds</button>
<button onclick="wrong3()">Doing nothing with ideas</button>
<button onclick="wrong3()">Avoiding experimentation</button>
`;
}

function correct3(){
score++;
updateScore();

document.getElementById("game").innerHTML = `
<h2>Correct!</h2>

<p>
I love building gameplay mechanics, stories, and immersive experiences
that players can enjoy.
</p>

<button onclick="question4()">Continue</button>
`;
}

function wrong3(){
document.getElementById("game").innerHTML = `
<h2>Not Quite</h2>

<p>
The joy of development comes from creating worlds players can explore.
</p>

<button onclick="question4()">Continue</button>
`;
}

function question4(){
document.getElementById("game").innerHTML = `
<h2>Chapter 4: Looking Ahead</h2>

<p>
What is one of my biggest goals?
</p>

<button onclick="correct4()">Leave a lasting mark on the gaming industry</button>
<button onclick="wrong4()">Stop creating games forever</button>
<button onclick="wrong4()">Avoid innovation</button>
`;
}

function correct4(){
score++;
updateScore();
ending();
}

function wrong4(){
ending();
}

function ending(){

let message = "";

if(score === 4){
message = `
<h2>Master Developer Ending</h2>

<p>
You understand my journey perfectly. My dream is to create meaningful,
immersive experiences that inspire players and showcase the power of
interactive storytelling.
</p>
`;
}
else if(score >= 2){
message = `
<h2>Creative Explorer Ending</h2>

<p>
You know much about my passion for game development. Every project is
another step toward building worlds that players will remember.
</p>
`;
}
else{
message = `
<h2>New Adventurer Ending</h2>

<p>
You have just begun learning about my journey. The path of game
development is filled with creativity, challenges, and endless
possibilities.
</p>
`;
}

document.getElementById("game").innerHTML = `
${message}

<p><strong>Final Score: ${score}/4</strong></p>

<p>
Thank you for exploring my story as Christine_890. Every game I create
is another opportunity to turn imagination into reality.
</p>

<button onclick="location.reload()">Play Again</button>
`;
}

</script>

</body>
</html>
